<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>监控数据展示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px 30px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-card .number {
      font-size: 36px;
      font-weight: bold;
      color: #00d4ff;
    }

    .stat-card .label {
      color: #aaa;
      margin-top: 5px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-refresh {
      background: #00d4ff;
      color: #1a1a2e;
    }

    .btn-refresh:hover {
      background: #00b8e6;
    }

    .btn-clear {
      background: #ff4757;
      color: white;
    }

    .btn-clear:hover {
      background: #ff3344;
    }

    .data-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .data-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid #00d4ff;
    }

    .data-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .data-time {
      color: #00d4ff;
      font-weight: bold;
    }

    .data-count {
      color: #aaa;
    }

    .data-content {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
    }

    .data-content pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      color: #e0e0e0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state h2 {
      margin-bottom: 10px;
      color: #888;
    }

    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #aaa;
    }

    .auto-refresh input {
      width: 18px;
      height: 18px;
    }

    .type-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 5px;
    }

    .type-behavior {
      background: #48bb8a;
    }

    .type-performance {
      background: #667eea;
    }

    .type-error {
      background: #f56565;
    }

    .type-custom {
      background: #ed8936;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📊 监控数据展示</h1>

    <div class="header">
      <div class="stats">
        <div class="stat-card">
          <div class="number" id="totalCount">0</div>
          <div class="label">总记录数</div>
        </div>
        <div class="stat-card">
          <div class="number" id="behaviorCount">0</div>
          <div class="label">行为数据</div>
        </div>
        <div class="stat-card">
          <div class="number" id="performanceCount">0</div>
          <div class="label">性能数据</div>
        </div>
        <div class="stat-card">
          <div class="number" id="errorCount">0</div>
          <div class="label">错误数据</div>
        </div>
      </div>

      <div class="btn-group">
        <label class="auto-refresh">
          <input type="checkbox" id="autoRefresh" checked>
          自动刷新 (3s)
        </label>
        <button class="btn-refresh" onclick="fetchData()">刷新数据</button>
        <button class="btn-clear" onclick="clearData()">清空数据</button>
      </div>
    </div>

    <div class="data-list" id="dataList">
      <div class="empty-state">
        <h2>暂无监控数据</h2>
        <p>访问测试页面并操作，监控数据将显示在这里</p>
      </div>
    </div>
  </div>

  <script>
    let monitorData = []
    let autoRefreshTimer = null

    async function fetchData() {
      try {
        const response = await fetch('http://localhost:8080/getMonitorData')
        const result = await response.json()

        if (result.success) {
          monitorData = result.data || []
          renderData()
        }
      } catch (error) {
        console.error('获取数据失败:', error)
      }
    }

    function getTypeBadge(type, subType) {
      const typeMap = {
        'behavior': 'behavior',
        'performance': 'performance',
        'error': 'error',
        'custom': 'custom'
      }
      const badgeClass = typeMap[type] || 'custom'
      return `<span class="type-badge type-${badgeClass}">${type || 'unknown'} - ${subType || 'unknown'}</span>`
    }

    function formatData(data) {
      if (!data) return 'null'
      
      if (Array.isArray(data)) {
        let output = ''
        data.forEach((item, index) => {
          output += `${getTypeBadge(item.type, item.subType)}\n`
          output += JSON.stringify(item, null, 2)
          if (index < data.length - 1) output += '\n\n'
        })
        return output
      }

      if (data.data && Array.isArray(data.data)) {
        let output = ''
        data.data.forEach((item, index) => {
          output += `${getTypeBadge(item.type, item.subType)}\n`
          output += JSON.stringify(item, null, 2)
          if (index < data.data.length - 1) output += '\n\n'
        })
        return output
      }

      return JSON.stringify(data, null, 2)
    }

    function getAllDataItems(item) {
      if (!item) return []
      
      if (Array.isArray(item)) {
        return item
      }
      
      if (item.data && Array.isArray(item.data)) {
        return item.data
      }
      
      if (Array.isArray(item.data?.data)) {
        return item.data.data
      }
      
      return [item]
    }

    function renderData() {
      const dataList = document.getElementById('dataList')
      const totalCount = document.getElementById('totalCount')
      const behaviorCount = document.getElementById('behaviorCount')
      const performanceCount = document.getElementById('performanceCount')
      const errorCount = document.getElementById('errorCount')

      let behaviorTotal = 0
      let performanceTotal = 0
      let errorTotal = 0

      if (monitorData.length === 0) {
        dataList.innerHTML = `
          <div class="empty-state">
            <h2>暂无监控数据</h2>
            <p>访问测试页面并操作，监控数据将显示在这里</p>
          </div>
        `
        totalCount.textContent = '0'
        behaviorCount.textContent = '0'
        performanceCount.textContent = '0'
        errorCount.textContent = '0'
        return
      }

      let html = ''
      monitorData.forEach((item, index) => {
        const time = new Date(item.timestamp).toLocaleString('zh-CN')
        const dataItems = getAllDataItems(item.data)
        
        dataItems.forEach(dataItem => {
          const t = dataItem.type || ''
          if (t === 'behavior') behaviorTotal++
          else if (t === 'performance') performanceTotal++
          else if (t === 'error') errorTotal++
        })

        html += `
          <div class="data-item">
            <div class="data-header">
              <span class="data-time">${time}</span>
              <span class="data-count">${dataItems.length} 条数据</span>
            </div>
            <div class="data-content">
              <pre>${escapeHtml(formatData(item.data))}</pre>
            </div>
          </div>
        `
      })

      dataList.innerHTML = html
      totalCount.textContent = monitorData.length
      behaviorCount.textContent = behaviorTotal
      performanceCount.textContent = performanceTotal
      errorCount.textContent = errorTotal
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    async function clearData() {
      if (!confirm('确定要清空所有监控数据吗？')) return

      try {
        const response = await fetch('http://localhost:8080/clearMonitorData', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        })
        const result = await response.json()

        if (result.success) {
          fetchData()
        }
      } catch (error) {
        console.error('清空数据失败:', error)
      }
    }

    function toggleAutoRefresh() {
      const checkbox = document.getElementById('autoRefresh')

      if (checkbox.checked) {
        autoRefreshTimer = setInterval(fetchData, 3000)
      } else {
        if (autoRefreshTimer) {
          clearInterval(autoRefreshTimer)
          autoRefreshTimer = null
        }
      }
    }

    document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh)

    // 初始加载
    fetchData()
    autoRefreshTimer = setInterval(fetchData, 3000)
  </script>
</body>

</html>
